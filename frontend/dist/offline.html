<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Expense Manager</title>
    <style>
      body {
        margin: 0;
        background: #f6f7fb;
        color: #0f172a;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      }
      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.1);
        padding: 24px;
        text-align: center;
      }
      h1 { margin: 0 0 8px; font-size: 24px; }
      p { margin: 0; color: #475569; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>You are offline</h1>
        <p>Reconnect to continue syncing your latest transactions and analytics.</p>
      </div>
    </div>
  </body>
</html>
